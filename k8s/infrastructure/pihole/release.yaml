apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
  namespace: pihole
spec:
  interval: 30m
  chart:
    spec:
      chart: pihole
      version: "2.*"
      sourceRef:
        kind: HelmRepository
        name: mojo2600
        namespace: pihole
      interval: 12h
  values:
    replicaCount: 1

    serviceWeb:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/loadBalancerIPs: 192.168.1.51  # ← change to your chosen IP
      port:
        http: 80
        https: 443

    serviceDns:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/loadBalancerIPs: 192.168.1.51  # ← same IP, different ports
      port:
        dns: 53

    adminPasswordSecret: pihole-secret

    # The critical bit — local DNS rewrite
    customDnsEntries:
      - "192.168.1.50 vault.cglavin50.com"
      - "192.168.1.50 cglavin50.com"

    # Wildcard for all future subdomains
    dnsmasq:
      customDnsEntries:
        - address=/cglavin50.com/192.168.1.50
