apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
  namespace: pihole
spec:
  interval: 30m
  chart:
    spec:
      chart: pihole
      version: "2.*"
      sourceRef:
        kind: HelmRepository
        name: mojo2600
        namespace: pihole
      interval: 12h
  values:
    replicaCount: 1

    hostNetwork: true
    dnsmasq:
      upstreamServers: []

    serviceWeb:
      type: ClusterIP
      port:
        http: 80

    ingress:
      enabled: false

    adminPasswordSecret: pihole-secret

    customDnsEntries:
      - "192.168.1.50 vault.cglavin50.com"
      - "192.168.1.50 cglavin50.com"
