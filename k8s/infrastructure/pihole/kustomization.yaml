apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml 
  - source.yaml
  - pvc.yaml
  - secret.yaml
  - release.yaml
  - route.yaml
  - dns-service.yaml

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: pihole
      namespace: pihole
    patch: |-
      [
        {
          "op": "replace",
          "path": "/spec/template/spec/volumes/0",
          "value": {
            "name": "config",
            "persistentVolumeClaim": {
              "claimName": "pihole-data"
            }
          }
        }
      ]
